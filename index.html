<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kearsipan</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold mb-4">Dashboard Arsip</h1>
        <div id="clock" class="text-xl font-mono mb-4">--:--:--</div>
        
        <table class="w-full bg-white shadow rounded-lg">
            <tbody id="table-body">
                <tr><td class="p-4 text-center">Memuat data...</td></tr>
            </tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5Xf_CugY9KDNobVWH-xjRpML3_I8CP_o",
            authDomain: "sistem-kearsipan-surat.firebaseapp.com",
            projectId: "sistem-kearsipan-surat",
            storageBucket: "sistem-kearsipan-surat.firebasestorage.app",
            messagingSenderId: "803590066917",
            appId: "1:803590066917:web:fc39c87efe4022976c7a0c"
        };

        const db = getFirestore(initializeApp(firebaseConfig));

        async function loadData() {
            try {
                const q = query(collection(db, "arsip_surat"), orderBy("tgl_input", "asc"));
                const res = await getDocs(q);
                const body = document.getElementById('table-body');
                body.innerHTML = '';
                res.forEach(d => {
                    const data = d.data();
                    body.innerHTML += `<tr><td class="p-3 border">${data.no}</td><td class="p-3 border">${data.uraian}</td></tr>`;
                });
            } catch (err) {
                console.error("Gagal load:", err);
            }
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        loadData();
    </script>
</body>
</html>
