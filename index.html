<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Arsip Surat</title>
</head>
<body class="bg-gray-100 p-8">
    <div class="text-right mb-4">
        <div id="clock" class="text-xl font-mono font-bold text-gray-700">--:--:--</div>
        <div id="date" class="text-sm text-gray-500">---</div>
    </div>

    <div class="mb-6">
        <button id="btn-tambah" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
            + Tambah Surat
        </button>
    </div>

    <table class="w-full bg-white shadow rounded-lg">
        <thead>
            <tr class="bg-gray-200">
                <th class="p-3">No</th>
                <th class="p-3">No Surat</th>
                <th class="p-3">Uraian</th>
            </tr>
        </thead>
        <tbody id="table-body">
            </tbody>
    </table>

    <script>
        // 1. Fungsi Jam & Tanggal
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
            document.getElementById('date').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 2. Fungsi Tombol Tambah
        document.getElementById('btn-tambah').onclick = function() {
            alert("Tombol berhasil diklik! Form tambah akan segera muncul.");
        };

        // 3. Simulasi Data (Ganti dengan Firebase nanti)
        document.getElementById('table-body').innerHTML = `
            <tr>
                <td class="p-3 border">1</td>
                <td class="p-3 border">B/001/2026</td>
                <td class="p-3 border">Surat Undangan Rapat</td>
            </tr>
        `;
    </script>
</body>
</html>
