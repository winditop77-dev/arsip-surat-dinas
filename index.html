<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kearsipan Surat | Dinas Pendidikan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
    </style>
</head>
<body class="text-gray-800">

    <header class="bg-white border-b border-gray-200 p-4 sticky top-0 z-30 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="font-bold text-lg">Sistem Kearsipan Surat</h1>
            <div class="text-right">
                <div id="date-display" class="text-xs text-gray-500 font-bold">--/--/----</div>
                <div id="clock" class="text-sm font-mono font-bold text-indigo-700">--:--:--</div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-blue-600 p-4 rounded-xl text-white">
                <p class="text-[10px] uppercase">Surat Masuk</p>
                <h3 id="stat-masuk" class="text-2xl font-bold">0</h3>
            </div>
            <div class="bg-orange-500 p-4 rounded-xl text-white">
                <p class="text-[10px] uppercase">Surat Keluar</p>
                <h3 id="stat-keluar" class="text-2xl font-bold">0</h3>
            </div>
            <div class="bg-emerald-500 p-4 rounded-xl text-white">
                <p class="text-[10px] uppercase">BAST</p>
                <h3 id="stat-bast" class="text-2xl font-bold">0</h3>
            </div>
            <div class="bg-purple-600 p-4 rounded-xl text-white cursor-pointer" onclick="toggleModal(true)">
                <p class="text-[10px] uppercase">BAP</p>
                <h3 id="stat-bap" class="text-2xl font-bold">0</h3>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border">
            <div class="flex justify-between mb-4">
                <h2 class="font-bold text-gray-700">Riwayat Kearsipan</h2>
                <button onclick="toggleModal(true)" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold">+ Tambah</button>
            </div>
            <table class="w-full text-sm text-left">
                <thead class="bg-gray-100 uppercase text-xs font-bold">
                    <tr>
                        <th class="p-3">#</th>
                        <th class="p-3">No. Surat</th>
                        <th class="p-3">Tanggal</th>
                        <th class="p-3">Bidang</th>
                        <th class="p-3">Jenis</th>
                        <th class="p-3">Uraian</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="divide-y">
                    <tr><td colspan="6" class="p-4 text-center">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
        <form id="form-surat" class="bg-white p-6 rounded-xl max-w-sm w-full space-y-4">
            <h2 class="font-bold">Input Surat Baru</h2>
            <input type="text" id="no_urut" placeholder="No Urut" class="w-full p-2 border rounded" required>
            <input type="date" id="tgl_surat" class="w-full p-2 border rounded" required>
            <select id="kode" class="w-full p-2 border rounded">
                <option value="B/">B/</option>
                <option value="B/800.1.11.1/">B/800.1.11.1/</option>
            </select>
            <select id="bidang" class="w-full p-2 border rounded">
                <option value="Sekretariat">Sekretariat</option>
                <option value="Bid SD">Bid SD</option>
            </select>
            <select id="jenis" class="w-full p-2 border rounded">
                <option value="Surat Masuk">Surat Masuk</option>
                <option value="Surat Keluar">Surat Keluar</option>
            </select>
            <textarea id="uraian" placeholder="Uraian" class="w-full p-2 border rounded" required></textarea>
            <div class="flex gap-2">
                <button type="button" onclick="toggleModal(false)" class="w-full p-2 bg-gray-200 rounded">Batal</button>
                <button type="submit" class="w-full p-2 bg-blue-600 text-white rounded">Simpan</button>
            </div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5Xf_CugY9KDNobVWH-xjRpML3_I8CP_o",
            authDomain: "sistem-kearsipan-surat.firebaseapp.com",
            projectId: "sistem-kearsipan-surat",
            storageBucket: "sistem-kearsipan-surat.firebasestorage.app",
            messagingSenderId: "803590066917",
            appId: "1:803590066917:web:fc39c87efe4022976c7a0c"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        window.dataArsip = [];

        window.renderTable = function() {
            const body = document.getElementById('table-body');
            body.innerHTML = '';
            window.dataArsip.forEach((d, i) => {
                body.innerHTML += `<tr><td class="p-3">${i+1}</td><td class="p-3">${d.no}</td><td class="p-3">${d.tgl}</td><td class="p-3">${d.bidang}</td><td class="p-3">${d.jenis}</td><td class="p-3">${d.uraian}</td></tr>`;
            });
        };

        async function loadData() {
            const q = query(collection(db, "arsip_surat"), orderBy("tgl_input", "asc"));
            const res = await getDocs(q);
            window.dataArsip = [];
            res.forEach(d => window.dataArsip.push({id: d.id, ...d.data()}));
            window.renderTable();
        }

        document.getElementById('form-surat').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "arsip_surat"), {
                no: document.getElementById('kode').value + document.getElementById('no_urut').value,
                tgl: document.getElementById('tgl_surat').value,
                bidang: document.getElementById('bidang').value,
                jenis: document.getElementById('jenis').value,
                uraian: document.getElementById('uraian').value,
                tgl_input: serverTimestamp()
            });
            toggleModal(false);
            loadData();
        };

        window.toggleModal = (s) => document.getElementById('modal').classList.toggle('hidden', !s);
        
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID');
            document.getElementById('date-display').innerText = now.toLocaleDateString('id-ID');
        }, 1000);

        loadData();
    </script>
</body>
</html>
